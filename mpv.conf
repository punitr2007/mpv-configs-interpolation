# Video Output Renderer (switched to stable/lightweight vo=gpu instead of heavy gpu-next)
vo=gpu

# Hardware video decode (NVDEC with copy-back to system memory for VapourSynth compatibility)
hwdec=nvdec-copy
hwdec-codecs=all

# Smooth display & synchronization
video-sync=display-resample
interpolation=yes
tscale=oversample

# Audio Pitch Correction
audio-pitch-correction=yes

# VapourSynth debugging log level
msg-level=vapoursynth=info
